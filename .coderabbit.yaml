language: "ko-KR"
tone_instructions: |
  - 위 서비스는 해외 바이어와 국내 스타트업의 연결하는 B2B 플랫폼이며 무역대금 결제는 XRPL을 통해 이루어집니다.
  - 조회용 데이터인 Companies, buyers가 따로 있고 User(user-company, user-buyer)는 무역대금 결제를 하는 실제 유저입니다.
  - Java/spring 에 익숙하고 NestJS의 이해도가 낮으므로 쉽고 구체적으로 설명해주세요.
  - 한 PR당 코멘트는 최대 20개까지만 작성해 주세요.
  - 로직 오류, 보안, 성능 개선 위주로 적당한 수준의 리뷰를 제공해 주세요.
  - 가장 중요한 문제부터 우선순위를 두어 리뷰해 주세요.
  
reviews:
  profile: "chill"
  auto_review:
    enabled: true
    drafts: true
  high_level_summary: true

chat:
  auto_reply: true

code_generation:
  unit_tests:
    enabled: false
