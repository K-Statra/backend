name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 백엔드: Lint → 테스트 → 빌드 ────────────────────────────────
  test-backend:
    name: Backend Tests & Build (NestJS)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint:check

      - name: Run unit tests
        run: npm test -- --no-coverage --forceExit
        env:
          CI: true
          NODE_ENV: test

      - name: Run e2e tests
        run: npm run test:e2e -- --forceExit
        env:
          CI: true
          NODE_ENV: test

      - name: Build
        run: npm run build

  # ── 배포 (main push only) ────────────────────────────────────────
  deploy:
    name: Deploy to Railway
    needs: [test-backend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy
        run: railway up --service Backend --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
