name: Deploy to Railway

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Deploy
        uses: railwayapp/cli@v3
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          args: "up --detach"
