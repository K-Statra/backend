    ImageCreate:
      type: object
      properties:
        url: { type: string, format: uri }
        caption: { type: string }
        alt: { type: string }
        tags:
          type: array
          items: { type: string }
      required: [ url ]
    PaymentCreateResponse:
      type: object
      properties:
        payment:
          allOf:
            - $ref: "#/components/schemas/Payment"
            - type: object
              properties:
                invoice:
                  type: object
                  properties:
                    expiresInSec: { type: integer, example: 780 }
        guide:
          type: object
          properties:
            title: { type: string, example: "결제 안내" }
            steps:
              type: array
              items:
                type: object
                properties:
                  key: { type: string, example: "payment.step.mobile_deeplink" }
                  default: { type: string, example: "모바일 지갑에서 딥링크를 열어 결제를 승인하세요." }
            texts:
              type: array
              items: { type: string }
            deeplink: { type: string, example: "ripple:rXXX...?amount=1&dt=123" }
            qr: { type: string, example: "ripple:rXXX...?amount=1&dt=123" }
            expiresInSec: { type: integer, example: 780 }
            locale: { type: string, example: "ko" }
      required: [ payment ]

  /payments/xumm/webhook:
    post:
      summary: XUMM/Xaman payload webhook
      description: Receives XUMM payload status callbacks and maps them to payment state.
      parameters:
        - in: header
          name: X-Xumm-Signature
          required: true
          description: HMAC-SHA256 signature in format `sha256=<hex>` over the raw body using shared secret
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                uuid: { type: string }
                status: { type: string, example: "SIGNED" }
                paymentId: { type: string, description: "Optional hint to locate payment" }
      responses:
        "200":
          description: Acknowledged
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
        "400":
          description: Bad Request / Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized (signature)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Payment not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /admin/payments:
    get:
      summary: List payments (admin)
      parameters:
        - in: header
          name: X-Admin-Token
          required: true
          schema: { type: string }
        - in: query
          name: status
          schema: { type: string, enum: [CREATED, PENDING, PAID, FAILED, CANCELLED] }
        - in: query
          name: buyerId
          schema: { type: string, pattern: "^[a-fA-F0-9]{24}$" }
        - in: query
          name: companyId
          schema: { type: string, pattern: "^[a-fA-F0-9]{24}$" }
        - in: query
          name: from
          schema: { type: string, format: date-time }
        - in: query
          name: to
          schema: { type: string, format: date-time }
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
      responses:
        "200":
          description: Paged list of payments
          content:
            application/json:
              schema:
                type: object
                properties:
                  page: { type: integer }
                  limit: { type: integer }
                  total: { type: integer }
                  totalPages: { type: integer }
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Payment"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /admin/payments/stats:
    get:
      summary: Payment stats (last 7 days)
      parameters:
        - in: header
          name: X-Admin-Token
          required: true
          schema: { type: string }
        - in: query
          name: buyerId
          schema: { type: string, pattern: "^[a-fA-F0-9]{24}$" }
        - in: query
          name: companyId
          schema: { type: string, pattern: "^[a-fA-F0-9]{24}$" }
        - in: query
          name: from
          required: false
          schema: { type: string, format: date-time }
          description: ISO datetime start (defaults to now-7d)
        - in: query
          name: to
          required: false
          schema: { type: string, format: date-time }
          description: ISO datetime end (defaults to now)
      responses:
        "200":
          description: Stats by status, currency, and currency+status
          content:
            application/json:
              schema:
                type: object
                properties:
                  since: { type: string, format: date-time }
                  until: { type: string, format: date-time }
                  byStatus:
                    type: object
                    additionalProperties: { type: integer }
                  byCurrency:
                    type: object
                    additionalProperties: { type: integer }
                  byCurrencyStatus:
                    type: object
                    additionalProperties:
                      type: object
                      additionalProperties: { type: integer }
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /admin/payments/export:
    get:
      summary: Export payments CSV (admin)
      parameters:
        - in: header
          name: X-Admin-Token
          required: true
          schema: { type: string }
        - in: query
          name: status
          schema: { type: string, enum: [CREATED, PENDING, PAID, FAILED, CANCELLED] }
        - in: query
          name: buyerId
          schema: { type: string, pattern: "^[a-fA-F0-9]{24}$" }
        - in: query
          name: companyId
          schema: { type: string, pattern: "^[a-fA-F0-9]{24}$" }
        - in: query
          name: from
          schema: { type: string, format: date-time }
        - in: query
          name: to
          schema: { type: string, format: date-time }
      responses:
        "200":
          description: CSV content
          content:
            text/csv:
              schema:
                type: string
                example: "_id,buyerId,companyId,amount,currency,status,provider,providerRef,createdAt\n..."
        "401":
