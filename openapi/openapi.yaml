    Payment:
      type: object
      properties:
        _id: { type: string }
        buyerId: { type: string }
        companyId: { type: string }
        amount: { type: number }
        currency: { type: string, example: "XRP" }
        status: { type: string, enum: ["CREATED", "PENDING", "PAID", "FAILED", "CANCELLED"] }
        memo: { type: string }
        createdAt: { type: string, format: date-time }
        provider: { type: string, example: "xrpl-testnet" }
        providerRef: { type: string, example: "invoice_..." }
        idempotencyKey: { type: string }
        invoice:
          type: object
          properties:
            qr: { type: string }
            deeplink: { type: string }
            expiresAt: { type: string, format: date-time }
            destAddress: { type: string }
            destTag: { type: integer }
        quote:
          type: object
          properties:
            baseCurrency: { type: string }
            quoteCurrency: { type: string }
            rate: { type: number }
            amountQuote: { type: number }
            expiresAt: { type: string, format: date-time }
      required: [ _id, buyerId, companyId, amount, currency, status ]

    PaymentCreate:
      type: object
      properties:
        amount: { type: number }
        currency: { type: string, enum: ["XRP", "USD", "KRW"], default: "XRP" }
        buyerId: { type: string }
        companyId: { type: string }
        memo: { type: string }
      required: [ amount, buyerId, companyId ]

    Image:
      type: object
      properties:
        _id: { type: string }
        url: { type: string, format: uri }
        caption: { type: string }
        alt: { type: string }
        tags:
          type: array
          items: { type: string }
        clipEmbedding:
          type: array
          items: { type: number }
